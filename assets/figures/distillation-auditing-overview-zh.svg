<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
<title id="title">大语言模型蒸馏与蒸馏审计的统一视图</title>
<desc id="desc">连接教师模型、蒸馏信号、学生模型、审计访问条件、证据层级、四种监督机制和 2025–2026 年代表性研究方向的详细概览。</desc>
<defs>
  <style>
    .bg{fill:#fff}.title{font:700 35px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#0b2c5f}.subtitle{font:16px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#253858}.head{font:700 19px 'Microsoft YaHei','Noto Sans SC',sans-serif}.body{font:15px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#18243b}.small{font:13px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#27364f}.tiny{font:11px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#35435a}.bold{font-weight:700}.center{text-anchor:middle}.right{text-anchor:end}.box{fill:#fff;stroke-width:2}.dash{stroke-dasharray:6 6}.arrow{stroke:#0b2c5f;stroke-width:3;fill:none;marker-end:url(#arrow)}.thin{stroke:#56657b;stroke-width:1.5;fill:none}.green{stroke:#3f7d44}.blue{stroke:#1c5ba7}.purple{stroke:#6d3a9c}.teal{stroke:#147b83}.orange{stroke:#bf5b16}.panelTitle{fill:#0b3b78}.white{fill:#fff}.caption{font:12px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#4b5568}.cardTitle{font:700 14px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#0b2c5f}.cardBody{font:12px 'Microsoft YaHei','Noto Sans SC',sans-serif;fill:#253858}.node{fill:#efe7fb;stroke:#6d3a9c;stroke-width:2}.ladder{stroke:#5b6878;stroke-width:7}.rung{stroke:#5b6878;stroke-width:5}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#0b2c5f"/></marker>
  <linearGradient id="gBlue" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1f7ff"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
  <linearGradient id="gGreen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3fbf1"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
  <linearGradient id="gPurple" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#faf5ff"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
  <linearGradient id="gTeal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#effafa"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
  <linearGradient id="gOrange" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
</defs>
<rect class="bg" width="1920" height="1080"/>
<text x="960" y="42" class="title center">图 1. 大语言模型蒸馏与蒸馏审计的统一视图</text>
<text x="960" y="70" class="subtitle center">从知识信号、教师角色和学生继承，到审计访问条件与不同强度的来源结论。</text>

<!-- 顶部主流程 -->
<rect x="20" y="95" width="300" height="285" rx="14" class="box green" fill="url(#gGreen)"/>
<text x="170" y="124" class="head center" fill="#275d2f">1. 教师模型</text><line x1="20" y1="137" x2="320" y2="137" class="thin green"/>
<circle cx="72" cy="182" r="27" fill="#e8f5e9" stroke="#3f7d44" stroke-width="2"/><text x="72" y="189" class="head center" fill="#275d2f">T</text>
<text x="112" y="168" class="body"><tspan class="bold">闭源前沿模型</tspan><tspan x="112" dy="20">GPT-4o、Claude、Gemini 等</tspan></text>
<circle cx="72" cy="240" r="27" fill="#e8f5e9" stroke="#3f7d44" stroke-width="2"/><text x="72" y="247" class="head center" fill="#275d2f">O</text>
<text x="112" y="226" class="body"><tspan class="bold">开放权重模型</tspan><tspan x="112" dy="20">Llama、Qwen、Mistral 等</tspan></text>
<circle cx="72" cy="298" r="27" fill="#e8f5e9" stroke="#3f7d44" stroke-width="2"/><text x="72" y="305" class="head center" fill="#275d2f">D</text>
<text x="112" y="284" class="body"><tspan class="bold">专用领域模型</tspan><tspan x="112" dy="20">代码、数学、工具、安全等</tspan></text>
<line x1="40" y1="337" x2="300" y2="337" class="thin green dash"/><text x="170" y="361" class="small center bold" fill="#275d2f">教师可以是单个模型，也可以是多个模型</text>

<path d="M320 238 H345" class="arrow"/>
<rect x="355" y="95" width="430" height="285" rx="14" class="box blue" fill="url(#gBlue)"/>
<text x="570" y="124" class="head center" fill="#174a8b">2. 蒸馏信号</text><line x1="355" y1="137" x2="785" y2="137" class="thin blue"/>
<g class="body">
  <rect x="372" y="151" width="396" height="39" rx="8" fill="#fff" stroke="#8eb5e4"/><text x="390" y="174" class="bold" fill="#174a8b">响应 / 指令蒸馏</text><text x="590" y="166" class="tiny"><tspan>模型输出、soft targets、</tspan><tspan x="590" dy="15">token 概率分布</tspan></text>
  <rect x="372" y="198" width="396" height="39" rx="8" fill="#fff" stroke="#8eb5e4"/><text x="390" y="221" class="bold" fill="#174a8b">推理 / 过程蒸馏</text><text x="590" y="213" class="tiny"><tspan>解释、CoT、子目标、</tspan><tspan x="590" dy="15">求解路径与中间动作</tspan></text>
  <rect x="372" y="245" width="396" height="39" rx="8" fill="#fff" stroke="#8eb5e4"/><text x="390" y="268" class="bold" fill="#174a8b">偏好 / 评判蒸馏</text><text x="590" y="260" class="tiny"><tspan>排序、评分、成对偏好、</tspan><tspan x="590" dy="15">批评与评价规则</tspan></text>
  <rect x="372" y="292" width="396" height="39" rx="8" fill="#fff" stroke="#8eb5e4"/><text x="390" y="315" class="bold" fill="#174a8b">数据 / 表示蒸馏</text><text x="590" y="307" class="tiny"><tspan>合成数据、隐藏状态、</tspan><tspan x="590" dy="15">注意力与嵌入表示</tspan></text>
  <rect x="372" y="339" width="396" height="30" rx="8" fill="#f5f3ff" stroke="#8eb5e4"/><text x="390" y="359" class="bold" fill="#174a8b">混合 / 复合蒸馏</text><text x="590" y="359" class="tiny">多信号、多阶段和多教师流程</text>
</g>

<path d="M785 238 H810" class="arrow"/>
<rect x="820" y="95" width="250" height="285" rx="14" class="box purple" fill="url(#gPurple)"/>
<text x="945" y="124" class="head center" fill="#5a2b85">3. 学生模型</text><line x1="820" y1="137" x2="1070" y2="137" class="thin purple"/>
<g transform="translate(0,5)"><circle cx="900" cy="176" r="11" class="node"/><circle cx="945" cy="176" r="11" class="node"/><circle cx="990" cy="176" r="11" class="node"/><circle cx="900" cy="222" r="11" class="node"/><circle cx="945" cy="222" r="11" class="node"/><circle cx="990" cy="222" r="11" class="node"/><line x1="900" y1="176" x2="945" y2="222" class="thin purple"/><line x1="900" y1="222" x2="945" y2="176" class="thin purple"/><line x1="945" y1="176" x2="990" y2="222" class="thin purple"/><line x1="945" y1="222" x2="990" y2="176" class="thin purple"/></g>
<text x="945" y="277" class="body center"><tspan>经过蒸馏、微调或对齐的学生，</tspan><tspan x="945" dy="20">可能继承教师的能力、决策边界、</tspan><tspan x="945" dy="20">推理习惯、偏好与安全规则。</tspan></text>

<path d="M1070 238 H1095" class="arrow"/>
<rect x="1105" y="95" width="300" height="285" rx="14" class="box teal" fill="url(#gTeal)"/>
<text x="1255" y="124" class="head center" fill="#0f6670">4. 审计访问条件</text><line x1="1105" y1="137" x2="1405" y2="137" class="thin teal"/>
<rect x="1122" y="151" width="266" height="66" rx="9" fill="#fff" stroke="#82c4c9"/><text x="1142" y="174" class="body bold" fill="#0f6670">白盒（White-box）</text><text x="1142" y="194" class="small">权重、架构、训练日志与路由</text>
<rect x="1122" y="226" width="266" height="66" rx="9" fill="#fff" stroke="#82c4c9"/><text x="1142" y="249" class="body bold" fill="#0f6670">灰盒（Gray-box）</text><text x="1142" y="269" class="small"><tspan>API 元数据、部分权重、</tspan><tspan x="1142" dy="16">top-k logprob 或检查点</tspan></text>
<rect x="1122" y="301" width="266" height="66" rx="9" fill="#fff" stroke="#82c4c9"/><text x="1142" y="324" class="body bold" fill="#0f6670">黑盒（Black-box）</text><text x="1142" y="344" class="small"><tspan>只能通过提示词和交互</tspan><tspan x="1142" dy="16">观察模型输出</tspan></text>

<path d="M1405 238 H1430" class="arrow"/>
<rect x="1440" y="95" width="460" height="285" rx="14" class="box orange" fill="url(#gOrange)"/>
<text x="1670" y="124" class="head center" fill="#9a3e08">5. 证据与结论</text><line x1="1440" y1="137" x2="1900" y2="137" class="thin orange"/>
<text x="1465" y="165" class="small"><tspan>证据可能来自行为相似性、内部信号、训练工件、</tspan><tspan x="1465" dy="17">官方披露或平台方的私有遥测。</tspan></text><line x1="1460" y1="202" x2="1880" y2="202" class="thin orange dash"/>
<g class="body"><text x="1470" y="231">✓ 是否支持存在蒸馏关系</text><text x="1470" y="261">✓ 归因到一个或多个具体教师</text><text x="1470" y="291">○ 角色归因：生成器、评判器、批评器、过滤器</text><text x="1470" y="321">○ 多教师混合恢复与相对影响估计</text><text x="1470" y="351">○ 完整蒸馏管线与数据流的来源重建</text></g>

<!-- 中部四种机制 -->
<rect x="20" y="405" width="1365" height="365" rx="14" fill="#fff" stroke="#1c5ba7" stroke-width="2"/><rect x="20" y="405" width="1365" height="36" rx="14" class="panelTitle"/><text x="702" y="430" class="head center white">示意：不同蒸馏信号如何产生</text>
<rect x="38" y="455" width="315" height="295" rx="12" fill="#f7fbff" stroke="#9dbfe7"/><text x="195" y="482" class="cardTitle center">(a) 响应蒸馏</text><text x="195" y="500" class="tiny center">soft targets / logits</text>
<rect x="62" y="530" width="67" height="35" rx="7" fill="#fff" stroke="#5b92d1"/><text x="95" y="552" class="small center">提示词</text><path d="M129 547 H170" class="arrow"/><circle cx="198" cy="547" r="27" fill="#e7f1ff" stroke="#1c5ba7" stroke-width="2"/><text x="198" y="553" class="body center bold" fill="#174a8b">T</text><path d="M225 547 H265" class="arrow"/><rect x="267" y="520" width="63" height="56" rx="6" fill="#fff" stroke="#5b92d1"/><line x1="280" y1="561" x2="280" y2="540" class="blue"/><line x1="294" y1="561" x2="294" y2="532" class="blue"/><line x1="308" y1="561" x2="308" y2="545" class="blue"/><line x1="322" y1="561" x2="322" y2="525" class="blue"/><text x="196" y="609" class="small center"><tspan>教师提供 token 概率分布</tspan><tspan x="196" dy="17">或生成式监督目标。</tspan></text><path d="M196 630 V662" class="arrow"/><rect x="110" y="670" width="172" height="48" rx="8" fill="#eef6ff" stroke="#5b92d1"/><text x="196" y="690" class="small center"><tspan>学生学习匹配</tspan><tspan x="196" dy="17">教师分布。</tspan></text>

<rect x="365" y="455" width="315" height="295" rx="12" fill="#f8fcf5" stroke="#9ec89e"/><text x="522" y="482" class="cardTitle center" fill="#275d2f">(b) 推理蒸馏</text><text x="522" y="500" class="tiny center">CoT / 过程监督</text><rect x="388" y="530" width="67" height="35" rx="7" fill="#fff" stroke="#69a36d"/><text x="421" y="552" class="small center">提示词</text><path d="M455 547 H492" class="arrow"/><circle cx="520" cy="547" r="27" fill="#edf8e9" stroke="#3f7d44" stroke-width="2"/><text x="520" y="553" class="body center bold" fill="#275d2f">T</text><path d="M547 547 H585" class="arrow"/><rect x="587" y="516" width="74" height="105" rx="7" fill="#fff" stroke="#69a36d"/><text x="624" y="537" class="tiny center">推理轨迹</text><text x="600" y="558" class="tiny">1. ...</text><text x="600" y="576" class="tiny">2. ...</text><text x="600" y="594" class="tiny">N. 答案</text><text x="522" y="646" class="small center"><tspan>教师提供解释、中间步骤、</tspan><tspan x="522" dy="17">子目标或工具动作。</tspan></text><path d="M522 672 V694" class="arrow"/><rect x="435" y="704" width="174" height="36" rx="8" fill="#eff8eb" stroke="#69a36d"/><text x="522" y="727" class="small center">学生学习推理模式与过程。</text>

<rect x="692" y="455" width="365" height="295" rx="12" fill="#fffaf0" stroke="#e7b866"/><text x="874" y="482" class="cardTitle center" fill="#9a5a00">(c) 偏好 / 评判蒸馏</text><text x="874" y="500" class="tiny center">排序 / 评分 / 评价规则监督</text><rect x="833" y="517" width="82" height="31" rx="7" fill="#fff" stroke="#d39a39"/><text x="874" y="538" class="small center">提示词</text><path d="M874 548 V568" class="thin orange"/><rect x="716" y="574" width="82" height="30" rx="6" fill="#fff" stroke="#d39a39"/><text x="757" y="594" class="small center">候选 A</text><rect x="833" y="574" width="82" height="30" rx="6" fill="#fff" stroke="#d39a39"/><text x="874" y="594" class="small center">候选 B</text><rect x="950" y="574" width="82" height="30" rx="6" fill="#fff" stroke="#d39a39"/><text x="991" y="594" class="small center">候选 N</text><path d="M757 604 V625 M874 604 V625 M991 604 V625" class="thin orange"/><rect x="743" y="625" width="263" height="42" rx="7" fill="#fff7df" stroke="#d39a39"/><text x="874" y="643" class="small center bold">教师评判器</text><text x="874" y="659" class="tiny center">排序器 / 评分器 / 基于规则的评价器</text><rect x="727" y="681" width="295" height="34" rx="7" fill="#fff" stroke="#d39a39"/><text x="874" y="703" class="small center">A &gt; B &gt; N · 分数 · 成对偏好 · 批评</text><path d="M874 715 V727" class="arrow"/><text x="874" y="744" class="small center bold">学生继承教师的偏好边界，而非只模仿写作风格。</text>

<rect x="1069" y="455" width="298" height="295" rx="12" fill="#faf7ff" stroke="#b497d6"/><text x="1218" y="482" class="cardTitle center" fill="#5a2b85">(d) 混合 / 多信号蒸馏</text><text x="1218" y="500" class="tiny center">多阶段与多教师蒸馏管线</text><circle cx="1118" cy="552" r="26" class="node"/><text x="1118" y="558" class="small center bold">T₁</text><circle cx="1218" cy="552" r="26" class="node"/><text x="1218" y="558" class="small center bold">T₂</text><circle cx="1318" cy="552" r="26" class="node"/><text x="1318" y="558" class="small center bold">Tₘ</text><path d="M1144 552 H1190 M1244 552 H1290" class="arrow"/><rect x="1100" y="607" width="236" height="54" rx="8" fill="#fff" stroke="#9d7ac5"/><text x="1218" y="629" class="small center bold"><tspan>生成器 + 推理器 + 评判器</tspan><tspan x="1218" dy="17">+ 批评器 + 过滤器</tspan></text><path d="M1218 661 V692" class="arrow"/><rect x="1148" y="700" width="140" height="38" rx="8" fill="#f3ebff" stroke="#9d7ac5"/><text x="1218" y="724" class="small center bold">学生模型</text>

<!-- 结论阶梯 -->
<rect x="1410" y="405" width="490" height="365" rx="14" fill="#fff" stroke="#1c5ba7" stroke-width="2"/><rect x="1410" y="405" width="490" height="36" rx="14" class="panelTitle"/><text x="1655" y="430" class="head center white">结论阶梯：证据能够支持什么</text><line x1="1470" y1="472" x2="1470" y2="720" class="ladder"/><line x1="1510" y1="472" x2="1510" y2="720" class="ladder"/><line x1="1470" y1="500" x2="1510" y2="500" class="rung"/><line x1="1470" y1="548" x2="1510" y2="548" class="rung"/><line x1="1470" y1="596" x2="1510" y2="596" class="rung"/><line x1="1470" y1="644" x2="1510" y2="644" class="rung"/><line x1="1470" y1="692" x2="1510" y2="692" class="rung"/><g class="small"><text x="1530" y="491" class="bold" fill="#9a3412">L1 检测</text><text x="1530" y="509">是否很可能发生过蒸馏？</text><text x="1530" y="539" class="bold" fill="#9a3412">L2 教师归因</text><text x="1530" y="557">哪个模型提供了蒸馏信号？</text><text x="1530" y="587" class="bold" fill="#9a3412">L3 角色归因</text><text x="1530" y="605">生成器、评判器、批评器、过滤器等。</text><text x="1530" y="635" class="bold" fill="#9a3412">L4 混合恢复</text><text x="1530" y="653">多个教师的相对影响如何？</text><text x="1530" y="683" class="bold" fill="#9a3412">L5 来源重建</text><text x="1530" y="701">恢复完整蒸馏管线和数据流。</text></g><rect x="1530" y="724" width="340" height="30" rx="7" fill="#eef6ff" stroke="#8eb5e4"/><text x="1700" y="744" class="tiny center">结论层级越高，所需假设越强、证据越多。</text>

<!-- 底部代表性方向 -->
<rect x="20" y="790" width="1880" height="236" rx="14" fill="#fff" stroke="#1c5ba7" stroke-width="2"/><rect x="20" y="790" width="1880" height="36" rx="14" class="panelTitle"/><text x="960" y="815" class="head center white">2025–2026 年代表性研究方向</text>
<rect x="35" y="840" width="355" height="168" rx="10" fill="#f8fbff" stroke="#9dbfe7"/><text x="212" y="865" class="cardTitle center">1. 教师归因（2025）</text><text x="212" y="884" class="tiny center">Who Taught You That? [1]</text><rect x="58" y="906" width="86" height="31" rx="6" fill="#fff" stroke="#5b92d1"/><text x="101" y="926" class="tiny center">候选 T₁…Tₖ</text><path d="M144 922 H184" class="arrow"/><rect x="188" y="906" width="75" height="31" rx="6" fill="#fff" stroke="#5b92d1"/><text x="225" y="926" class="tiny center">学生 S</text><path d="M263 922 H303" class="arrow"/><rect x="307" y="902" width="62" height="39" rx="6" fill="#eef6ff" stroke="#5b92d1"/><text x="338" y="917" class="tiny center"><tspan>教师</tspan><tspan x="338" dy="14">分类器</tspan></text><text x="212" y="967" class="cardBody center"><tspan>根据学生输出中的词汇或句法足迹，</tspan><tspan x="212" dy="16">识别黑盒候选教师。</tspan></text>

<rect x="405" y="840" width="355" height="168" rx="10" fill="#f8fbff" stroke="#9dbfe7"/><text x="582" y="865" class="cardTitle center">2. 模型来源检验（2025）</text><text x="582" y="884" class="tiny center">Model Provenance Testing [2]</text><rect x="428" y="905" width="90" height="35" rx="6" fill="#fff" stroke="#5b92d1"/><text x="473" y="927" class="tiny center">候选模型</text><rect x="548" y="905" width="70" height="35" rx="6" fill="#fff" stroke="#5b92d1"/><text x="583" y="927" class="tiny center">待测 S</text><path d="M518 922 H542 M618 922 H646" class="arrow"/><rect x="650" y="899" width="88" height="47" rx="6" fill="#eef6ff" stroke="#5b92d1"/><text x="694" y="916" class="tiny center"><tspan>多重</tspan><tspan x="694" dy="14">假设检验</tspan></text><text x="582" y="967" class="cardBody center"><tspan>将黑盒行为相似性与无关模型</tspan><tspan x="582" dy="16">形成的基线分布比较。</tspan></text>

<rect x="775" y="840" width="355" height="168" rx="10" fill="#f8fbff" stroke="#9dbfe7"/><text x="952" y="865" class="cardTitle center">3. 开放权重蒸馏检测（2025）</text><text x="952" y="884" class="tiny center">Knowledge Distillation Detection [3]</text><rect x="802" y="905" width="83" height="35" rx="6" fill="#fff" stroke="#5b92d1"/><text x="843" y="927" class="tiny center">教师 API</text><rect x="913" y="905" width="83" height="35" rx="6" fill="#fff" stroke="#5b92d1"/><text x="954" y="927" class="tiny center">学生权重</text><path d="M885 922 H907 M996 922 H1020" class="arrow"/><rect x="1024" y="899" width="82" height="47" rx="6" fill="#eef6ff" stroke="#5b92d1"/><text x="1065" y="916" class="tiny center"><tspan>合成探针</tspan><tspan x="1065" dy="14">+ 统计评分</tspan></text><text x="952" y="967" class="cardBody center"><tspan>结合生成式探针与待审计模型</tspan><tspan x="952" dy="16">的参数访问条件。</tspan></text>

<rect x="1145" y="840" width="355" height="168" rx="10" fill="#f8fbff" stroke="#9dbfe7"/><text x="1322" y="865" class="cardTitle center">4. MoE 专家签名（2025）</text><text x="1322" y="884" class="tiny center">Detecting KD via Expert Signatures [4]</text><circle cx="1192" cy="922" r="18" class="node"/><circle cx="1240" cy="922" r="18" class="node"/><circle cx="1288" cy="922" r="18" class="node"/><path d="M1308 922 H1355" class="arrow"/><rect x="1360" y="902" width="112" height="40" rx="6" fill="#f3ebff" stroke="#9d7ac5"/><text x="1416" y="918" class="tiny center"><tspan>路由与专家</tspan><tspan x="1416" dy="14">协作模式</tspan></text><text x="1322" y="967" class="cardBody center"><tspan>把专家专门化和路由协作</tspan><tspan x="1322" dy="16">作为结构化蒸馏证据。</tspan></text>

<rect x="1515" y="840" width="370" height="168" rx="10" fill="#f8fbff" stroke="#9dbfe7"/><text x="1700" y="865" class="cardTitle center">5. 来源集合（2026）</text><text x="1700" y="884" class="tiny center">Provable Model Provenance Set [7]</text><rect x="1543" y="905" width="100" height="35" rx="6" fill="#fff" stroke="#5b92d1"/><text x="1593" y="927" class="tiny center">候选来源池</text><path d="M1643 922 H1680" class="arrow"/><rect x="1685" y="899" width="86" height="47" rx="6" fill="#eef6ff" stroke="#5b92d1"/><text x="1728" y="916" class="tiny center"><tspan>检验并</tspan><tspan x="1728" dy="14">逐步排除</tspan></text><path d="M1771 922 H1800" class="arrow"/><rect x="1803" y="905" width="61" height="35" rx="6" fill="#f3ebff" stroke="#9d7ac5"/><text x="1833" y="927" class="tiny center">P(S)</text><text x="1700" y="967" class="cardBody center"><tspan>返回具有统计控制的候选来源集合，</tspan><tspan x="1700" dy="16">而不是强制选择唯一胜者。</tspan></text>
